apiVersion: apps/v1
kind: Deployment
metadata:
  name: node-prom-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: node-prom-app
  template:
    metadata:
      labels:
        app: node-prom-app
    spec:
      containers:
        - name: app-ctr
          image: lucky352/node-prom-app:latest
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /metrics
              port: 3000
              initialDelaySeconds: 5
              periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /metrics
              port: 3000
              initialDelaySeconds: 15
              periodSeconds: 20
          resources:
            limits:
              memory: "128Mi"
              cpu: "500m"
            requests:
              memory: "64Mi"
              cpu: "250m"
              